<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 960 300">
  <title id="title">SynthPopCan workflow map</title>
  <desc id="desc">A left-to-right workflow from source data to controls or models, synthesis, validation, and research outputs.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .source { fill: #e0f2fe; stroke: #0284c7; }
      .prepare { fill: #ecfdf5; stroke: #059669; }
      .synth { fill: #fff7ed; stroke: #ea580c; }
      .validate { fill: #f5f3ff; stroke: #7c3aed; }
      .output { fill: #f1f5f9; stroke: #475569; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font-size: 17px; font-weight: 700; }
      .small { font-size: 13px; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="300"/>
  <rect class="card source" x="35" y="90" width="155" height="110" rx="8"/>
  <text class="text label" x="112" y="126" text-anchor="middle">Sources</text>
  <text class="text small" x="112" y="152" text-anchor="middle">Census Profile</text>
  <text class="text small" x="112" y="174" text-anchor="middle">WDS, PUMF, fixtures</text>

  <rect class="card prepare" x="235" y="90" width="155" height="110" rx="8"/>
  <text class="text label" x="312" y="126" text-anchor="middle">Prepare</text>
  <text class="text small" x="312" y="152" text-anchor="middle">controls</text>
  <text class="text small" x="312" y="174" text-anchor="middle">seed rows or models</text>

  <rect class="card synth" x="435" y="90" width="155" height="110" rx="8"/>
  <text class="text label" x="512" y="126" text-anchor="middle">Synthesize</text>
  <text class="text small" x="512" y="152" text-anchor="middle">IPF weights</text>
  <text class="text small" x="512" y="174" text-anchor="middle">linked generation</text>

  <rect class="card validate" x="635" y="90" width="155" height="110" rx="8"/>
  <text class="text label" x="712" y="126" text-anchor="middle">Validate</text>
  <text class="text small" x="712" y="152" text-anchor="middle">margins</text>
  <text class="text small" x="712" y="174" text-anchor="middle">links and caveats</text>

  <rect class="card output" x="805" y="90" width="120" height="110" rx="8"/>
  <text class="text label" x="865" y="126" text-anchor="middle">Outputs</text>
  <text class="text small" x="865" y="152" text-anchor="middle">CSV</text>
  <text class="text small" x="865" y="174" text-anchor="middle">reports</text>

  <path class="arrow" d="M 190 145 H 235"/>
  <path class="arrow" d="M 390 145 H 435"/>
  <path class="arrow" d="M 590 145 H 635"/>
  <path class="arrow" d="M 790 145 H 805"/>

  <text class="text small" x="480" y="250" text-anchor="middle">Keep source notes, commands, mappings, random seeds, and validation reports with the output.</text>
</svg>
