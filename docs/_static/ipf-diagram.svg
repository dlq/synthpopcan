<svg viewBox="0 0 1060 260" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" font-size="13">
  <title>IPF diagram with integerization: seed weights, fitted weights, integer counts</title>
  <desc>Three tables connected by arrows. Panel one shows seed weights of 4, 6, 3, 7 with margin targets of 20 and 15 in rows, 12 and 23 in columns. An arrow labelled IPF leads to panel two showing fitted weights 5.9, 14.1, 6.1, 8.9 whose row and column sums exactly match the targets. A second arrow labelled integerize leads to panel three showing integer counts 6, 14, 6, 9 with the original fractional weights shown in small grey text. The integer row and column totals still match the original targets.</desc>

  <!-- ── PANEL 1: Seed ──
       cell width 70, margin width 46, inter-column gap 12
       Male:   x=55–125  center=90
       Female: x=137–207 center=172
       Target: x=219–265 center=242
  -->
  <text x="166" y="20" text-anchor="middle" font-weight="600" font-size="14" fill="#1a1a2e">Seed weights</text>

  <text x="90"  y="44" text-anchor="middle" font-size="12" fill="#555">Male</text>
  <text x="172" y="44" text-anchor="middle" font-size="12" fill="#555">Female</text>
  <text x="242" y="44" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">Target</text>

  <text x="28" y="84"  text-anchor="middle" font-size="12" fill="#555">Young</text>
  <text x="28" y="142" text-anchor="middle" font-size="12" fill="#555">Old</text>

  <rect x="55"  y="53" width="70" height="44" rx="4" fill="#f1f5f9"/>
  <text x="90"  y="80" text-anchor="middle" font-size="16" fill="#1a1a2e">4</text>
  <rect x="137" y="53" width="70" height="44" rx="4" fill="#f1f5f9"/>
  <text x="172" y="80" text-anchor="middle" font-size="16" fill="#1a1a2e">6</text>

  <rect x="55"  y="110" width="70" height="44" rx="4" fill="#f1f5f9"/>
  <text x="90"  y="137" text-anchor="middle" font-size="16" fill="#1a1a2e">3</text>
  <rect x="137" y="110" width="70" height="44" rx="4" fill="#f1f5f9"/>
  <text x="172" y="137" text-anchor="middle" font-size="16" fill="#1a1a2e">7</text>

  <rect x="219" y="53"  width="46" height="44" rx="4" fill="#dbeafe"/>
  <text x="242" y="80"  text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">20</text>
  <rect x="219" y="110" width="46" height="44" rx="4" fill="#dbeafe"/>
  <text x="242" y="137" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">15</text>

  <rect x="55"  y="168" width="70" height="32" rx="4" fill="#dbeafe"/>
  <text x="90"  y="189" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">12</text>
  <rect x="137" y="168" width="70" height="32" rx="4" fill="#dbeafe"/>
  <text x="172" y="189" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">23</text>
  <text x="28"  y="189" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">Target</text>
  <text x="242" y="189" text-anchor="middle" font-size="10" fill="#999">35</text>

  <rect x="55"  y="216" width="12" height="12" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="72"  y="226" font-size="10.5" fill="#555">seed weight</text>
  <rect x="155" y="216" width="12" height="12" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="172" y="226" font-size="10.5" fill="#555">margin target</text>

  <!-- ── ARROW 1 ── -->
  <line x1="278" y1="113" x2="343" y2="113" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="343,108 353,113 343,118" fill="#aaa"/>
  <text x="310" y="104" text-anchor="middle" font-size="10.5" fill="#888">IPF</text>

  <!-- ── PANEL 2: Fitted ──
       cell width 66, margin width 46, inter-column gap 12
       Male:   x=375–441 center=408
       Female: x=453–519 center=486
       Total:  x=531–577 center=554
  -->
  <text x="476" y="20" text-anchor="middle" font-weight="600" font-size="14" fill="#1a1a2e">Fitted weights</text>

  <text x="408" y="44" text-anchor="middle" font-size="12" fill="#555">Male</text>
  <text x="486" y="44" text-anchor="middle" font-size="12" fill="#555">Female</text>
  <text x="554" y="44" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">Total</text>

  <text x="352" y="84"  text-anchor="middle" font-size="12" fill="#555">Young</text>
  <text x="352" y="142" text-anchor="middle" font-size="12" fill="#555">Old</text>

  <rect x="375" y="53" width="66" height="44" rx="4" fill="#f1f5f9"/>
  <text x="408" y="80" text-anchor="middle" font-size="15" fill="#1a1a2e">5.9</text>
  <rect x="453" y="53" width="66" height="44" rx="4" fill="#f1f5f9"/>
  <text x="486" y="80" text-anchor="middle" font-size="15" fill="#1a1a2e">14.1</text>

  <rect x="375" y="110" width="66" height="44" rx="4" fill="#f1f5f9"/>
  <text x="408" y="137" text-anchor="middle" font-size="15" fill="#1a1a2e">6.1</text>
  <rect x="453" y="110" width="66" height="44" rx="4" fill="#f1f5f9"/>
  <text x="486" y="137" text-anchor="middle" font-size="15" fill="#1a1a2e">8.9</text>

  <rect x="531" y="53"  width="46" height="44" rx="4" fill="#dbeafe"/>
  <text x="554" y="77"  text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">20</text>
  <text x="554" y="91"  text-anchor="middle" font-size="11" fill="#16a34a">✓</text>
  <rect x="531" y="110" width="46" height="44" rx="4" fill="#dbeafe"/>
  <text x="554" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">15</text>
  <text x="554" y="148" text-anchor="middle" font-size="11" fill="#16a34a">✓</text>

  <rect x="375" y="168" width="66" height="32" rx="4" fill="#dbeafe"/>
  <text x="400" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">12</text>
  <text x="418" y="188" font-size="11" fill="#16a34a">✓</text>
  <rect x="453" y="168" width="66" height="32" rx="4" fill="#dbeafe"/>
  <text x="478" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">23</text>
  <text x="496" y="188" font-size="11" fill="#16a34a">✓</text>
  <text x="352" y="189" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">Total</text>
  <text x="554" y="189" text-anchor="middle" font-size="10" fill="#999">35</text>

  <!-- ── ARROW 2 ── -->
  <line x1="590" y1="113" x2="668" y2="113" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="668,108 678,113 668,118" fill="#aaa"/>
  <text x="634" y="101" text-anchor="middle" font-size="10.5" fill="#888">integer-</text>
  <text x="634" y="114" text-anchor="middle" font-size="10.5" fill="#888">ize</text>

  <!-- ── PANEL 3: Integer counts ──
       cell width 66, margin width 46, inter-column gap 12
       Male:   x=703–769 center=736
       Female: x=781–847 center=814
       Total:  x=859–905 center=882
  -->
  <text x="804" y="20" text-anchor="middle" font-weight="600" font-size="14" fill="#1a1a2e">Integer counts</text>

  <text x="736" y="44" text-anchor="middle" font-size="12" fill="#555">Male</text>
  <text x="814" y="44" text-anchor="middle" font-size="12" fill="#555">Female</text>
  <text x="882" y="44" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">Total</text>

  <text x="677" y="84"  text-anchor="middle" font-size="12" fill="#555">Young</text>
  <text x="677" y="142" text-anchor="middle" font-size="12" fill="#555">Old</text>

  <rect x="703" y="53" width="66" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="736" y="79" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">6</text>
  <text x="764" y="63" text-anchor="end" font-size="9" fill="#aaa">5.9</text>

  <rect x="781" y="53" width="66" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="814" y="79" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">14</text>
  <text x="842" y="63" text-anchor="end" font-size="9" fill="#aaa">14.1</text>

  <rect x="703" y="110" width="66" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="736" y="136" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">6</text>
  <text x="764" y="120" text-anchor="end" font-size="9" fill="#aaa">6.1</text>

  <rect x="781" y="110" width="66" height="44" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="814" y="136" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">9</text>
  <text x="842" y="120" text-anchor="end" font-size="9" fill="#aaa">8.9</text>

  <rect x="859" y="53"  width="46" height="44" rx="4" fill="#dbeafe"/>
  <text x="882" y="77"  text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">20</text>
  <text x="882" y="91"  text-anchor="middle" font-size="11" fill="#16a34a">✓</text>
  <rect x="859" y="110" width="46" height="44" rx="4" fill="#dbeafe"/>
  <text x="882" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">15</text>
  <text x="882" y="148" text-anchor="middle" font-size="11" fill="#16a34a">✓</text>

  <rect x="703" y="168" width="66" height="32" rx="4" fill="#dbeafe"/>
  <text x="728" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">12</text>
  <text x="746" y="188" font-size="11" fill="#16a34a">✓</text>
  <rect x="781" y="168" width="66" height="32" rx="4" fill="#dbeafe"/>
  <text x="806" y="188" text-anchor="middle" font-size="13" font-weight="600" fill="#2563eb">23</text>
  <text x="824" y="188" font-size="11" fill="#16a34a">✓</text>
  <text x="677" y="189" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">Total</text>
  <text x="882" y="189" text-anchor="middle" font-size="10" fill="#999">35</text>

  <rect x="703" y="216" width="12" height="12" rx="2" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="720" y="226" font-size="10.5" fill="#555">integer count</text>
  <text x="808" y="226" font-size="9.5" fill="#aaa">(small grey = fractional weight)</text>
</svg>
