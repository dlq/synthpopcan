<svg viewBox="0 0 560 200" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,sans-serif" font-size="12">
  <title>Support and purity: high-support mixed-outcome leaf versus low-support high-purity leaf</title>
  <desc>Two leaf node cards side by side. The left green card shows n=240 with outcomes Single 38%, Semi 25%, Apt 37% — labelled high support, mixed outcomes, stable. The right amber card shows n=4 with Single 100%, Semi 0%, Apt 0% — labelled low support, high purity, warning.</desc>

  <!-- Left card: high support, mixed outcomes -->
  <rect x="10" y="10" width="240" height="162" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="130" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">Leaf</text>
  <text x="130" y="52" text-anchor="middle" font-size="14" fill="#334155">n = 240</text>

  <!-- Single 38% -->
  <text x="24"  y="76" font-size="11" fill="#64748b">Single</text>
  <rect x="80"  y="63" width="46" height="14" rx="2" fill="#86efac"/>
  <text x="242" y="76" text-anchor="end" font-size="11" fill="#166534">38 %</text>

  <!-- Semi 25% -->
  <text x="24"  y="98" font-size="11" fill="#64748b">Semi</text>
  <rect x="80"  y="85" width="30" height="14" rx="2" fill="#86efac"/>
  <text x="242" y="98" text-anchor="end" font-size="11" fill="#166534">25 %</text>

  <!-- Apt 37% -->
  <text x="24"  y="120" font-size="11" fill="#64748b">Apt</text>
  <rect x="80"  y="107" width="44" height="14" rx="2" fill="#86efac"/>
  <text x="242" y="120" text-anchor="end" font-size="11" fill="#166534">37 %</text>

  <line x1="20" y1="133" x2="240" y2="133" stroke="#bbf7d0" stroke-width="1"/>
  <text x="130" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">high support · mixed outcomes</text>
  <text x="130" y="165" text-anchor="middle" font-size="10.5" fill="#64748b">stable — generates varied rows</text>

  <!-- "vs" label -->
  <text x="280" y="97" text-anchor="middle" font-size="15" fill="#cbd5e1">vs</text>

  <!-- Right card: low support, high purity -->
  <rect x="310" y="10" width="240" height="162" rx="8" fill="#fefce8" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="430" y="33" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Leaf</text>
  <text x="430" y="52" text-anchor="middle" font-size="14" fill="#334155">n = 4</text>

  <!-- Single 100% -->
  <text x="324" y="76" font-size="11" fill="#64748b">Single</text>
  <rect x="380" y="63" width="120" height="14" rx="2" fill="#fde68a"/>
  <text x="542" y="76" text-anchor="end" font-size="11" fill="#b45309">100 %</text>

  <!-- Semi 0% -->
  <text x="324" y="98" font-size="11" fill="#64748b">Semi</text>
  <text x="542" y="98" text-anchor="end" font-size="11" fill="#94a3b8">0 %</text>

  <!-- Apt 0% -->
  <text x="324" y="120" font-size="11" fill="#64748b">Apt</text>
  <text x="542" y="120" text-anchor="end" font-size="11" fill="#94a3b8">0 %</text>

  <line x1="320" y1="133" x2="540" y2="133" stroke="#fde68a" stroke-width="1"/>
  <text x="430" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">⚠ low support · high purity</text>
  <text x="430" y="165" text-anchor="middle" font-size="10.5" fill="#64748b">warning — may reveal a rare pattern</text>
</svg>
