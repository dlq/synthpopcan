<svg viewBox="0 0 580 378" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" font-size="13">
  <title>Margins diagram: a 2D table where the row totals form the age margin and the column totals form the tenure margin</title>
  <desc>A two-dimensional table with age group rows (Young 25–34, Middle-aged 35–64, Seniors 65+) and tenure columns (Owner, Renter). The six internal cells contain seed joint-distribution counts: 150, 200, 280, 170, 130, 70. A blue Age margin column on the right shows the row sums 350, 450, 200. A blue Tenure margin row at the bottom shows the column sums 560 and 440.</desc>

  <!-- Title -->
  <text x="222" y="20" text-anchor="middle" font-size="13.5" font-weight="600" fill="#1a1a2e">Margins are aggregate totals along one dimension</text>

  <!-- Axis labels -->
  <text x="222" y="36" text-anchor="middle" font-size="11" fill="#94a3b8">Tenure →</text>
  <text transform="rotate(-90,16,170)" x="16" y="170" text-anchor="middle" font-size="11" fill="#94a3b8">Age group ↓</text>

  <!-- ── Header row ── -->
  <rect x="120" y="42" width="98" height="38" fill="#f8fafc"/>
  <text x="169" y="65" text-anchor="middle" font-size="12" fill="#374151">Owner</text>

  <rect x="226" y="42" width="98" height="38" fill="#f8fafc"/>
  <text x="275" y="65" text-anchor="middle" font-size="12" fill="#374151">Renter</text>

  <rect x="334" y="42" width="78" height="38" fill="#dbeafe"/>
  <text x="373" y="57" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Age</text>
  <text x="373" y="73" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">margin</text>

  <!-- ── Row label column ── -->
  <rect x="10" y="80"  width="102" height="58" fill="#f8fafc"/>
  <text x="61" y="104" text-anchor="middle" font-size="11" fill="#374151">Young</text>
  <text x="61" y="119" text-anchor="middle" font-size="11" fill="#6b7280">(25–34)</text>

  <rect x="10" y="138" width="102" height="58" fill="#f8fafc"/>
  <text x="61" y="162" text-anchor="middle" font-size="11" fill="#374151">Middle-aged</text>
  <text x="61" y="177" text-anchor="middle" font-size="11" fill="#6b7280">(35–64)</text>

  <rect x="10" y="196" width="102" height="58" fill="#f8fafc"/>
  <text x="61" y="220" text-anchor="middle" font-size="11" fill="#374151">Seniors</text>
  <text x="61" y="235" text-anchor="middle" font-size="11" fill="#6b7280">(65+)</text>

  <rect x="10" y="263" width="102" height="38" fill="#dbeafe"/>
  <text x="61" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">Tenure</text>
  <text x="61" y="294" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">margin</text>

  <!-- ── Internal cells (grey) ── -->
  <rect x="120" y="80"  width="98" height="58" fill="#f1f5f9"/>
  <text x="169" y="113" text-anchor="middle" font-size="17" fill="#334155">150</text>

  <rect x="226" y="80"  width="98" height="58" fill="#f1f5f9"/>
  <text x="275" y="113" text-anchor="middle" font-size="17" fill="#334155">200</text>

  <rect x="120" y="138" width="98" height="58" fill="#f1f5f9"/>
  <text x="169" y="171" text-anchor="middle" font-size="17" fill="#334155">280</text>

  <rect x="226" y="138" width="98" height="58" fill="#f1f5f9"/>
  <text x="275" y="171" text-anchor="middle" font-size="17" fill="#334155">170</text>

  <rect x="120" y="196" width="98" height="58" fill="#f1f5f9"/>
  <text x="169" y="229" text-anchor="middle" font-size="17" fill="#334155">130</text>

  <rect x="226" y="196" width="98" height="58" fill="#f1f5f9"/>
  <text x="275" y="229" text-anchor="middle" font-size="17" fill="#334155">70</text>

  <text x="222" y="94" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">joint distribution (from seed)</text>

  <!-- ── Age margin column (blue) ── -->
  <rect x="334" y="80"  width="78" height="58" fill="#dbeafe"/>
  <text x="373" y="113" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">350</text>

  <rect x="334" y="138" width="78" height="58" fill="#dbeafe"/>
  <text x="373" y="171" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">450</text>

  <rect x="334" y="196" width="78" height="58" fill="#dbeafe"/>
  <text x="373" y="229" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">200</text>

  <!-- ── Tenure margin row (blue) ── -->
  <rect x="120" y="263" width="98" height="38" fill="#dbeafe"/>
  <text x="169" y="286" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">560</text>

  <rect x="226" y="263" width="98" height="38" fill="#dbeafe"/>
  <text x="275" y="286" text-anchor="middle" font-size="17" font-weight="700" fill="#1d4ed8">440</text>

  <!-- Grand total -->
  <rect x="334" y="263" width="78" height="38" fill="#eff6ff"/>
  <text x="373" y="286" text-anchor="middle" font-size="14" fill="#93c5fd">1,000</text>

  <!-- ── Grid lines ── -->
  <rect x="10" y="42" width="402" height="259" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>
  <line x1="112" y1="42"  x2="112" y2="301" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="218" y1="42"  x2="218" y2="301" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="324" y1="42"  x2="324" y2="301" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10"  y1="80"  x2="412" y2="80"  stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10"  y1="138" x2="412" y2="138" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10"  y1="196" x2="412" y2="196" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="10"  y1="254" x2="412" y2="254" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ── Right bracket → age margin annotation ── -->
  <line x1="414" y1="80"  x2="414" y2="254" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <line x1="414" y1="80"  x2="420" y2="80"  stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <line x1="414" y1="254" x2="420" y2="254" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <text x="428" y="154" font-size="10.5" font-weight="600" fill="#2563eb">age margin</text>
  <text x="428" y="168" font-size="10"   fill="#64748b">row sum across tenure</text>
  <text x="428" y="182" font-size="10"   fill="#64748b">→ public control total</text>

  <!-- ── Bottom bracket → tenure margin annotation ── -->
  <line x1="120" y1="305" x2="324" y2="305" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <line x1="120" y1="305" x2="120" y2="311" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <line x1="324" y1="305" x2="324" y2="311" stroke="#2563eb" stroke-width="1" opacity="0.5"/>
  <text x="222" y="324" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2563eb">tenure margin</text>
  <text x="222" y="338" text-anchor="middle" font-size="10"   fill="#64748b">col sum across age group</text>
  <text x="222" y="352" text-anchor="middle" font-size="10"   fill="#64748b">→ public control total</text>

  <!-- ── Legend ── -->
  <rect x="64"  y="364" width="11" height="11" rx="2" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="79"  y="374" font-size="10.5" fill="#555">joint distribution (seed microdata)</text>
  <rect x="310" y="364" width="11" height="11" rx="2" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="325" y="374" font-size="10.5" fill="#555">margin = public control</text>
</svg>
