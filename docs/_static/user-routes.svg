<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 920 420">
  <title id="title">Three routes through SynthPopCan</title>
  <desc id="desc">A diagram showing web app, command line, and notebook routes from a research question to generated data and validation notes.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .start { fill: #e0f2fe; stroke: #0284c7; }
      .web { fill: #ecfdf5; stroke: #059669; }
      .cli { fill: #fff7ed; stroke: #ea580c; }
      .api { fill: #f5f3ff; stroke: #7c3aed; }
      .out { fill: #f1f5f9; stroke: #475569; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font-size: 15px; }
      .label { font-size: 18px; font-weight: 700; }
      .tiny { font-size: 13px; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" width="920" height="420"/>
  <rect class="card start" x="40" y="150" width="180" height="120" rx="8"/>
  <text class="text label" x="130" y="190" text-anchor="middle">Research question</text>
  <text class="text small" x="130" y="220" text-anchor="middle">What population</text>
  <text class="text small" x="130" y="242" text-anchor="middle">do we need?</text>

  <rect class="card web" x="310" y="40" width="210" height="90" rx="8"/>
  <text class="text label" x="415" y="72" text-anchor="middle">Web app</text>
  <text class="text tiny" x="415" y="98" text-anchor="middle">guided local exploration</text>

  <rect class="card cli" x="310" y="165" width="210" height="90" rx="8"/>
  <text class="text label" x="415" y="197" text-anchor="middle">Command line</text>
  <text class="text tiny" x="415" y="223" text-anchor="middle">reproducible workflows</text>

  <rect class="card api" x="310" y="290" width="210" height="90" rx="8"/>
  <text class="text label" x="415" y="322" text-anchor="middle">Notebook API</text>
  <text class="text tiny" x="415" y="348" text-anchor="middle">code, prose, and outputs</text>

  <rect class="card out" x="640" y="150" width="240" height="120" rx="8"/>
  <text class="text label" x="760" y="188" text-anchor="middle">Generated artifacts</text>
  <text class="text small" x="760" y="218" text-anchor="middle">CSV outputs</text>
  <text class="text small" x="760" y="240" text-anchor="middle">validation reports</text>
  <text class="text small" x="760" y="262" text-anchor="middle">method notes</text>

  <path class="arrow" d="M 220 190 C 255 120, 270 85, 310 85"/>
  <path class="arrow" d="M 220 210 H 310"/>
  <path class="arrow" d="M 220 230 C 255 300, 270 335, 310 335"/>
  <path class="arrow" d="M 520 85 C 580 85, 585 180, 640 190"/>
  <path class="arrow" d="M 520 210 H 640"/>
  <path class="arrow" d="M 520 335 C 580 335, 585 240, 640 230"/>
</svg>
