<svg viewBox="0 0 740 388" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" font-size="13">
  <title>Tree-based generation: a decision tree splits on conditioning columns and samples from leaf frequency distributions</title>
  <desc>A decision tree rooted at Tenure splits into Owner and Renter branches. Each branch splits further on Household Size into 1-2 and 3+ groups. The four leaf nodes show the observed dwelling-type frequency distributions used to sample generated values. Owner/1-2: Apt 22%, Semi 18%, Single 60%, n=841. Owner/3+: Apt 5%, Semi 20%, Single 75%, n=1204. Renter/1-2: Apt 61%, Semi 14%, Single 25%, n=592. Renter/3+: Apt 45%, Semi 22%, Single 33%, n=388.</desc>

  <!-- Root node -->
  <rect x="280" y="12" width="180" height="46" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="370" y="31" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Tenure</text>
  <text x="370" y="48" text-anchor="middle" font-size="11" fill="#555">conditioning column</text>

  <!-- Branch lines from root -->
  <line x1="330" y1="58" x2="175" y2="112" stroke="#aaa" stroke-width="1.5"/>
  <line x1="410" y1="58" x2="565" y2="112" stroke="#aaa" stroke-width="1.5"/>

  <!-- Branch labels -->
  <text x="228" y="96" text-anchor="middle" font-size="11" fill="#888">Owner</text>
  <text x="512" y="96" text-anchor="middle" font-size="11" fill="#888">Renter</text>

  <!-- Mid-level nodes -->
  <rect x="90" y="112" width="170" height="46" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>
  <text x="175" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Household Size</text>
  <text x="175" y="148" text-anchor="middle" font-size="11" fill="#555">conditioning column</text>

  <rect x="480" y="112" width="170" height="46" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>
  <text x="565" y="131" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Household Size</text>
  <text x="565" y="148" text-anchor="middle" font-size="11" fill="#555">conditioning column</text>

  <!-- Branch lines from Owner node -->
  <line x1="140" y1="158" x2="68" y2="214" stroke="#aaa" stroke-width="1.5"/>
  <line x1="210" y1="158" x2="280" y2="214" stroke="#aaa" stroke-width="1.5"/>

  <!-- Branch lines from Renter node -->
  <line x1="530" y1="158" x2="460" y2="214" stroke="#aaa" stroke-width="1.5"/>
  <line x1="600" y1="158" x2="672" y2="214" stroke="#aaa" stroke-width="1.5"/>

  <!-- Branch labels -->
  <text x="90"  y="198" text-anchor="middle" font-size="10" fill="#888">1–2</text>
  <text x="257" y="198" text-anchor="middle" font-size="10" fill="#888">3+</text>
  <text x="438" y="198" text-anchor="middle" font-size="10" fill="#888">1–2</text>
  <text x="693" y="198" text-anchor="middle" font-size="10" fill="#888">3+</text>

  <!-- Leaf 1: Owner, 1-2 -->
  <rect x="14" y="214" width="108" height="104" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="68" y="232" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Owner · 1–2 persons</text>
  <text x="38" y="252" font-size="10" fill="#333">Apt</text>     <text x="108" y="252" text-anchor="end" font-size="10" fill="#333">22%</text>
  <text x="38" y="268" font-size="10" fill="#333">Semi</text>    <text x="108" y="268" text-anchor="end" font-size="10" fill="#333">18%</text>
  <text x="38" y="284" font-size="10" fill="#333">Single</text>  <text x="108" y="284" text-anchor="end" font-size="10" fill="#1a1a2e" font-weight="600">60%</text>
  <line x1="24" y1="292" x2="112" y2="292" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="68" y="308" text-anchor="middle" font-size="9" fill="#16a34a">n = 841</text>

  <!-- Leaf 2: Owner, 3+ -->
  <rect x="228" y="214" width="108" height="104" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="282" y="232" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Owner · 3+ persons</text>
  <text x="238" y="252" font-size="10" fill="#333">Apt</text>    <text x="326" y="252" text-anchor="end" font-size="10" fill="#333">5%</text>
  <text x="238" y="268" font-size="10" fill="#333">Semi</text>   <text x="326" y="268" text-anchor="end" font-size="10" fill="#333">20%</text>
  <text x="238" y="284" font-size="10" fill="#333">Single</text> <text x="326" y="284" text-anchor="end" font-size="10" fill="#1a1a2e" font-weight="600">75%</text>
  <line x1="238" y1="292" x2="326" y2="292" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="282" y="308" text-anchor="middle" font-size="9" fill="#16a34a">n = 1,204</text>

  <!-- Leaf 3: Renter, 1-2 -->
  <rect x="406" y="214" width="108" height="104" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="460" y="232" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Renter · 1–2 persons</text>
  <text x="416" y="252" font-size="10" fill="#333">Apt</text>    <text x="504" y="252" text-anchor="end" font-size="10" fill="#1a1a2e" font-weight="600">61%</text>
  <text x="416" y="268" font-size="10" fill="#333">Semi</text>   <text x="504" y="268" text-anchor="end" font-size="10" fill="#333">14%</text>
  <text x="416" y="284" font-size="10" fill="#333">Single</text> <text x="504" y="284" text-anchor="end" font-size="10" fill="#333">25%</text>
  <line x1="416" y1="292" x2="504" y2="292" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="460" y="308" text-anchor="middle" font-size="9" fill="#16a34a">n = 592</text>

  <!-- Leaf 4: Renter, 3+ -->
  <rect x="618" y="214" width="108" height="104" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <text x="672" y="232" text-anchor="middle" font-size="9.5" font-weight="600" fill="#555">Renter · 3+ persons</text>
  <text x="628" y="252" font-size="10" fill="#333">Apt</text>    <text x="716" y="252" text-anchor="end" font-size="10" fill="#1a1a2e" font-weight="600">45%</text>
  <text x="628" y="268" font-size="10" fill="#333">Semi</text>   <text x="716" y="268" text-anchor="end" font-size="10" fill="#333">22%</text>
  <text x="628" y="284" font-size="10" fill="#333">Single</text> <text x="716" y="284" text-anchor="end" font-size="10" fill="#333">33%</text>
  <line x1="628" y1="292" x2="716" y2="292" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="672" y="308" text-anchor="middle" font-size="9" fill="#16a34a">n = 388</text>

  <!-- Caption bar -->
  <rect x="14" y="330" width="712" height="44" rx="4" fill="#f1f5f9"/>
  <text x="370" y="348" text-anchor="middle" font-size="10.5" fill="#555">
    <tspan x="370" dy="0">Each leaf holds observed target frequencies from training data.</tspan>
    <tspan x="370" dy="16">To generate, walk the tree using a row's conditions and sample from the matching leaf.</tspan>
  </text>
</svg>
