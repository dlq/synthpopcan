name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev --group docs

      - name: Lint Python
        run: uv run ruff check src tests scripts

      - name: Check Python formatting
        run: uv run ruff format --check src tests scripts

      - name: Run tests
        run: uv run pytest

      - name: Build documentation
        run: uv run sphinx-build -W -b html docs docs/_build/html

  smoke:
    name: Smoke test (clean install)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Build wheel
        run: uv build --wheel

      - name: Install wheel in isolated environment
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/pip install dist/*.whl

      - name: Verify CLI entry point
        run: .smoke-venv/bin/synthpopcan --help

      - name: Verify guide commands
        run: |
          .smoke-venv/bin/synthpopcan guide ipf
          .smoke-venv/bin/synthpopcan guide model

      - name: Verify model catalogue
        run: |
          .smoke-venv/bin/synthpopcan models list
          .smoke-venv/bin/synthpopcan tree list-packages

      - name: Verify bundled demo generation
        run: |
          .smoke-venv/bin/synthpopcan tree generate-from-package \
            demo-linked-household-person \
            --households 10 \
            --households-out /tmp/smoke-households.csv \
            --persons-out /tmp/smoke-persons.csv

  web:
    name: Web assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check web assets
        run: npm run check:web
